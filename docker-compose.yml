x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - swimcoach
    logging: *default-logging

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set (see .env.example)}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - swimcoach
    logging: *default-logging

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    environment:
      API_URL: http://backend:8000
      SITE_INDEXABLE: ${SITE_INDEXABLE:-false}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:?TURNSTILE_SECRET_KEY must be set (see .env.example)}
    networks:
      swimcoach:
        # Pinned so the backend's uvicorn --forwarded-allow-ips can trust
        # exactly this one address for X-Forwarded-For (real client IP,
        # forwarded by the frontend's own server-side BFF layer) rather than
        # the whole subnet. Keep this in sync with the backend Dockerfile's
        # --forwarded-allow-ips value if this ever changes.
        ipv4_address: 172.28.0.10
    logging: *default-logging

  # Image tag duplicated in ../back-end/docker-compose.yml (local dev) since they're
  # two separate compose files with deliberately different auth config - keep both
  # in sync when bumping either one.
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: swimcoach
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swimcoach
    logging: *default-logging

  # Image tag duplicated in ../back-end/docker-compose.yml (local dev) - keep in sync.
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swimcoach
    logging: *default-logging

networks:
  swimcoach:
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
