x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER}
      BASIC_AUTH_HASH: ${BASIC_AUTH_HASH}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - swimcoach
    logging: *default-logging

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set (see .env.example)}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - swimcoach
    logging: *default-logging

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    environment:
      API_URL: http://backend:8000
      SITE_INDEXABLE: ${SITE_INDEXABLE:-false}
    networks:
      swimcoach:
        # Pinned so the backend's uvicorn --forwarded-allow-ips can trust
        # exactly this one address for X-Forwarded-For (real client IP,
        # forwarded by the frontend's own server-side BFF layer) rather than
        # the whole subnet. Keep this in sync with the backend Dockerfile's
        # --forwarded-allow-ips value if this ever changes.
        ipv4_address: 172.28.0.10
    logging: *default-logging

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: swimcoach
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swimcoach
    logging: *default-logging

networks:
  swimcoach:
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
